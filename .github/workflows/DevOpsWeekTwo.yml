name: DevOpsWeekTwo CI

on:
  push:
    paths:
      - 'week1/**'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./week1
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: week1/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

  test:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./week1
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: week1/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        if: github.event_name == 'pull_request'
        uses: ArtiomTr/jest-coverage-report-action@v2.3.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: ./week1
          threshold: 80

      - name: Run Tests (push)
        if: github.event_name != 'pull_request'
        run: npm test

  linting:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./week1
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: week1/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --format json --output-file reports/lint.json
        continue-on-error: true

      - name: ESLint Report
        uses: ldiego73/eslint-report-action@v1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          report: week1/reports/lint.json
          title: ESLint Report
          view-rules: true
          fail-on-warning: false
          total-problems: 100
    
